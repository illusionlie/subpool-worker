name: ✨ 功能请求
description: 提议为 SubPool Worker 新增功能或改进现有能力
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        感谢你的提议!请先在 [已有 Issue](../issues) 中搜索过类似想法,避免重复。

  - type: dropdown
    id: module
    attributes:
      label: 目标模块
      description: 该功能主要影响哪个模块?
      options:
        - 订阅分发 (/sub/:token)
        - 格式转换 (subconverter)
        - 订阅组管理
        - 管理后台 (UI/API)
        - 配置管理
        - 访问防护
        - 日志与通知
        - 部署 / CI
        - 其他
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 现状与痛点
      description: 当前无法满足什么需求?为什么需要这个改进?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 期望方案
      description: 你希望它如何工作?(API 形态、配置项、交互方式等均可描述)
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 是否有绕过方式或其他实现思路?说明为什么本方案更优。

  - type: checkboxes
    id: scope
    attributes:
      label: 范围确认
      description: 帮助评估实现成本与影响面。
      options:
        - label: 该功能需要在 Worker 运行时内实现(非纯前端)
          required: false
        - label: 该功能需要新增/变更 KV 数据结构
          required: false
        - label: 我愿意为此提交 PR(或参与讨论实现细节)
          required: false
