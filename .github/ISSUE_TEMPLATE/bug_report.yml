name: 🐛 Bug 报告
description: 报告 SubPool Worker 的功能异常、错误或不符合预期的行为
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈 Bug!在提交前请先确认:

        - 已阅读 [README](../blob/main/README.md) 了解预期行为
        - 已在 [已有 Issue](../issues) 中搜索过类似问题,未发现重复
        - 若是部署/配置问题,请先核对 `wrangler.toml` 是否与 `wrangler.toml.example` 一致

  - type: dropdown
    id: module
    attributes:
      label: 受影响模块
      description: 问题出现在哪个功能模块?
      options:
        - 订阅分发 (/sub/:token)
        - 格式转换 (subconverter)
        - 订阅组管理 (增删改查)
        - 管理后台 (页面/登录/会话)
        - 配置管理 (config 导入导出)
        - 访问防护 (封禁/中国大陆限制)
        - 日志与通知 (Telegram)
        - 部署 / CI / 构建产物
        - 其他
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
      description: 你期望发生什么?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 实际发生了什么?如有报错请贴出关键日志。
      placeholder: |
        例: 访问 /sub/abc?clash 时返回 500,日志显示 subconverter 超时...
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 复现步骤
      description: 最小可复现路径(越详细越好)。
      placeholder: |
        1. 用以下订阅组配置 ...
        2. 请求 GET /sub/<token>?clash
        3. 观察到 ...
    validations:
      required: true

  - type: input
    id: client
    attributes:
      label: 客户端(如涉及订阅)
      description: 使用的客户端名称与版本,如 Clash Verge 1.x / sing-box 1.x。不涉及可填 N/A。
      placeholder: "Clash Verge 1.5.5"

  - type: textarea
    id: environment
    attributes:
      label: 运行环境
      description: 影响问题定位的关键信息。
      value: |
        - 部署方式: wrangler deploy / dev 本地
        - Worker 运行时: Cloudflare(线上) / wrangler dev
        - Node.js 版本:
        - wrangler 版本:
        - 浏览器(如涉及管理后台):
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我已执行 `npm run check`(lint + test)且本地无报错(若可在本地复现)
          required: false
        - label: 我提供的信息不包含敏感数据(Token、密码、INIT_SECRET、KV ID 等)
          required: true
