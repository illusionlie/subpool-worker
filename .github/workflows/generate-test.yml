name: Generate and check deploy command

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    name: Lint and test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint . --max-warnings 0

      - name: Run tests
        run: npm test

  check-deploy-command:
    runs-on: ubuntu-latest
    name: Check deploy command
    needs: lint-and-test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate wrangler.toml for test
        run: |
          sed -e "s/__WORKER_NAME__/sub-pool-worker-test-${GITHUB_SHA}/g" \
            -e "s/__KV_NAMESPACE_ID__/00000000000000000000000000000000/g" \
            -e "s/__ADMIN_PASSWORD__/admin-password/g" \
            -e "s/__JWT_SECRET__/jwt-secret/g" \
            -e "s/__DEBUG_SECRET__/debug-secret/g" \
            wrangler.toml.example > wrangler.toml

      - name: Check deploy command (dry run)
        run: npm run build
