<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录</title>
  <script>
    (() => {
      try {
        const storedTheme = localStorage.getItem('subpool-theme');
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        const theme = storedTheme === 'light' || storedTheme === 'dark'
          ? storedTheme
          : (prefersDark ? 'dark' : 'light');

        document.documentElement.setAttribute('data-theme', theme);
      } catch (_err) {
        document.documentElement.setAttribute('data-theme', 'light');
      }
    })();
  </script>
  <style>
    :root {
      color-scheme: light;
      --bg-color: #f0f2f5;
      --text-color: #212529;
      --card-bg: #ffffff;
      --border-color: #d9d9d9;
      --input-bg: #ffffff;
      --input-text-color: #212529;
      --input-placeholder-color: #6c757d;
      --shadow-color: rgba(0, 0, 0, 0.15);
      --primary-color: #007bff;
      --primary-hover-color: #0056b3;
      --error-color: #dc3545;
      --secondary-color: #6c757d;
      --secondary-hover-color: #5a6268;
    }

    html[data-theme='dark'] {
      color-scheme: dark;
      --bg-color: #111827;
      --text-color: #e5e7eb;
      --card-bg: #1f2937;
      --border-color: #374151;
      --input-bg: #111827;
      --input-text-color: #f3f4f6;
      --input-placeholder-color: #9ca3af;
      --shadow-color: rgba(0, 0, 0, 0.45);
      --primary-color: #3b82f6;
      --primary-hover-color: #2563eb;
      --error-color: #f87171;
      --secondary-color: #4b5563;
      --secondary-hover-color: #374151;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background-color: var(--bg-color);
      color: var(--text-color);
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    .theme-toggle-wrapper {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 2;
    }

    .theme-toggle {
      padding: 8px 12px;
      font-size: 14px;
      border-radius: 6px;
      border: none;
      background-color: var(--secondary-color);
      color: #fff;
      cursor: pointer;
    }

    .theme-toggle:hover {
      background-color: var(--secondary-hover-color);
    }

    .login-box {
      background: var(--card-bg);
      padding: 40px;
      border-radius: 8px;
      box-shadow: 0 4px 12px var(--shadow-color);
      width: 360px;
      max-width: calc(100vw - 32px);
      box-sizing: border-box;
      border: 1px solid var(--border-color);
    }

    h1 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 24px;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    input[type='password'] {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border-color);
      border-radius: 4px;
      font-size: 16px;
      box-sizing: border-box;
      background-color: var(--input-bg);
      color: var(--input-text-color);
    }

    input::placeholder {
      color: var(--input-placeholder-color);
    }

    .btn {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border-radius: 4px;
      border: none;
      background-color: var(--primary-color);
      color: #fff;
      cursor: pointer;
    }

    .btn:hover {
      background-color: var(--primary-hover-color);
    }

    .error {
      color: var(--error-color);
      text-align: center;
      min-height: 1.2em;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="theme-toggle-wrapper">
    <button id="theme-toggle" class="theme-toggle" type="button" aria-label="切换亮暗模式">切换主题</button>
  </div>
  <div class="login-box">
    <h1>管理员登录</h1>
    <form id="login-form">
      <div class="form-group">
        <input type="password" id="password" placeholder="请输入密码" required autofocus>
      </div>
      <button type="submit" class="btn">登录</button>
      <p id="error-message" class="error"></p>
    </form>
  </div>
  <script>
    const form = document.getElementById('login-form');
    const passwordInput = document.getElementById('password');
    const errorMessage = document.getElementById('error-message');
    const themeToggle = document.getElementById('theme-toggle');

    function getTheme() {
      try {
        const storedTheme = localStorage.getItem('subpool-theme');

        if (storedTheme === 'light' || storedTheme === 'dark') {
          return storedTheme;
        }
      } catch (_err) {
        // ignore storage errors
      }

      return window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    }

    function setTheme(theme) {
      const normalizedTheme = theme === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', normalizedTheme);

      try {
        localStorage.setItem('subpool-theme', normalizedTheme);
      } catch (_err) {
        // ignore storage errors
      }

      themeToggle.textContent = normalizedTheme === 'dark' ? '☀️ 亮色' : '🌙 暗色';
    }

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute('data-theme') || getTheme();
      setTheme(currentTheme === 'dark' ? 'light' : 'dark');
    }

    setTheme(getTheme());
    themeToggle.addEventListener('click', toggleTheme);

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorMessage.textContent = '';
      const loginButton = form.querySelector('button[type="submit"]');
      loginButton.disabled = true;
      loginButton.textContent = '登录中...';
      try {
        const response = await fetch('/admin/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: passwordInput.value })
        });

        if (response.ok) {
          window.location.reload();
          return;
        }

        const data = await response.json().catch(() => ({}));

        if (response.status === 403) {
          window.location.href = '/admin/init';
          return;
        }

        if (response.status === 429) {
          errorMessage.textContent = data.error || '登录失败次数过多，请稍后再试';
        } else {
          errorMessage.textContent = data.error || '密码错误，请重试。';
        }
      } catch (_err) {
        errorMessage.textContent = '发生网络错误。';
      } finally {
        loginButton.disabled = false;
        loginButton.textContent = '登录';
      }
    });
  </script>
</body>
</html>
